# ═══════════════════════════════════════════════════════════════════
# Weather Agent — fully self-contained stack
#
#   docker compose up -d
#
# Brings up: mongo + redis + ollama (auto-pulls all models) + the agent.
# No API keys, no external services. First boot pulls ~4 GB of models
# into the `ollama-data` volume; subsequent ups are fast.
#
# Models:
#   primary  → llama3.2:3b   (~2 GB, best small-model tool-calling)
#   fallback → qwen2.5:3b    (~1.9 GB, different family from primary)
#   routing  → phi4-mini     (~2.5 GB, semantic skill routing)
# ═══════════════════════════════════════════════════════════════════

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongo:27017/agent-example-weather
      REDIS_URL: redis://redis:6379

      # All three LLM roles → local Ollama. Endpoints are hardcoded here so
      # the .env can keep `localhost:11434` for embedded/host-mode runs.
      LLM_PRIMARY_PROVIDER: ollama
      LLM_PRIMARY_MODEL: ${LLM_PRIMARY_MODEL:-llama3.2:3b}
      LLM_PRIMARY_API_KEY: ""
      LLM_PRIMARY_ENDPOINT: http://ollama:11434
      LLM_PRIMARY_TEMPERATURE: ${LLM_PRIMARY_TEMPERATURE:-0.7}
      LLM_PRIMARY_MAX_TOKENS: ${LLM_PRIMARY_MAX_TOKENS:-1000}

      LLM_FALLBACK_PROVIDER: ollama
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-qwen2.5:3b}
      LLM_FALLBACK_API_KEY: ""
      LLM_FALLBACK_ENDPOINT: http://ollama:11434

      LLM_ROUTING_PROVIDER: ollama
      LLM_ROUTING_MODEL: ${LLM_ROUTING_MODEL:-phi4-mini}
      LLM_ROUTING_ENDPOINT: http://ollama:11434
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
      ollama-init: { condition: service_completed_successfully }

  mongo:
    image: mongo:8.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # The ollama/ollama image does not ship `curl`, so we use the bundled
    # `ollama` CLI to check liveness. `ollama list` returns 0 once the
    # daemon's API is up.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # One-shot init: blocks the agent from starting until all three models
  # have been pulled. `ollama pull` is idempotent — on subsequent ups it
  # finds the layers already present and exits in seconds.
  ollama-init:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - |
        until ollama list 2>/dev/null; do sleep 2; done && \
        ollama pull ${LLM_PRIMARY_MODEL:-llama3.2:3b} && \
        ollama pull ${LLM_FALLBACK_MODEL:-qwen2.5:3b} && \
        ollama pull ${LLM_ROUTING_MODEL:-phi4-mini} && \
        echo 'All models ready.'
    depends_on:
      ollama: { condition: service_healthy }
    restart: "no"

volumes:
  mongo-data:
  ollama-data:
