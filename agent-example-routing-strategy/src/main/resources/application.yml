##############################################################################
# Routing strategy example — agent configuration
#
# Strategy is set to `semantic` so the test layer can exercise the embedding
# path without needing an LLM. Switch to `hybrid` for production (semantic
# first, LLM fallback) or `llm` to force every request through the routing
# model.
##############################################################################

spring:
  application:
    name: agent-example-routing-strategy
  threads:
    virtual:
      enabled: true
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/agent-example-routing-strategy}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/agent-example-routing-strategy}
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

agent:
  llm:
    primary:
      provider: ${LLM_PRIMARY_PROVIDER:openai}
      model: ${LLM_PRIMARY_MODEL:gpt-4o}
      api-key: ${LLM_PRIMARY_API_KEY:}
      endpoint: ${LLM_PRIMARY_ENDPOINT:}
      temperature: ${LLM_PRIMARY_TEMPERATURE:0.2}
      max-tokens: ${LLM_PRIMARY_MAX_TOKENS:500}
    fallback:
      provider: ${LLM_FALLBACK_PROVIDER:anthropic}
      model: ${LLM_FALLBACK_MODEL:claude-sonnet-4-20250514}
      api-key: ${LLM_FALLBACK_API_KEY:}
      endpoint: ${LLM_FALLBACK_ENDPOINT:}
    routing-model:
      provider: ${LLM_ROUTING_PROVIDER:ollama}
      model: ${LLM_ROUTING_MODEL:phi4-mini}
      api-key: ${LLM_ROUTING_API_KEY:}
      endpoint: ${LLM_ROUTING_ENDPOINT:http://localhost:11434}
      temperature: 0.0
      max-tokens: 50

  skill:
    path: classpath:skills/
    hot-reload: false
    cache-ttl-minutes: 60

  routing:
    strategy: semantic
    fallback-skill: default-skill
    semantic:
      # Lowered from the framework default (0.82) because all-MiniLM-L6-v2 produces
      # 0.3–0.5 cosine similarities for plain English skill descriptions vs. realistic
      # user prompts. The example's three descriptions are deliberately disjoint —
      # 0.30 is comfortably below the weather/finance/coding match scores yet far
      # above the score for unrelated gibberish (which lands < 0.10).
      threshold: 0.30

  memory:
    working:
      max-messages: 20
      ttl-minutes: 30
    episodic:
      max-summaries: 5
      ttl-days: 365
    knowledge:
      max-segments: 10
    composer:
      max-context-tokens: 3000

  guardrail:
    input:
      max-chars: 2000
      injection-guard:
        enabled: true
    output:
      schema-validator:
        enabled: true

  cost-tracking:
    enabled: true
    retention-days: 365

  audit:
    enabled: true
    retention-days: 365

  chat-ui:
    enabled: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui

logging:
  level:
    root: INFO
    ai.gargantua.example.routingstrategy: DEBUG
    ai.gargantua.autoconfigure.SemanticRoutingService: DEBUG
    ai.gargantua.autoconfigure.RoutingService: DEBUG
