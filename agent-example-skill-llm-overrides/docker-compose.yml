# `mvn test` covers the override pipeline in isolation against mock
# ChatModel beans. This compose file exists only for parity with the other
# per-feature examples; you don't need it for the core verification flow.

services:
  mongo:
    image: mongo:8.0
    ports: ["27017:27017"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
