##############################################################################
# Skill-level LLM overrides example — agent configuration
#
# Two model aliases:
#   primary  → hard-coded "primary-model" name (any string — never resolved
#              for real because the test stubs the ChatModel @Bean)
#   precise  → custom alias under agent.llm.models.precise.* — picked when a
#              skill declares `metadata.preferred-model: precise`
#
# Tests register a TestRecordingChatModel @Bean for each alias and capture
# the ChatRequest the orchestrator forwards. No real LLM call is made.
##############################################################################

spring:
  application:
    name: agent-example-skill-llm-overrides
  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

agent:
  llm:
    primary-alias: primary           # Resolve "primary" via the @Bean(name="primary") test mock
    fallback-alias: ""

    primary:
      provider: openai
      model: primary-model
      api-key: stub
      temperature: 0.7
      max-tokens: 1000

    routing-model:
      provider: ollama
      model: phi4-mini
      endpoint: http://localhost:11434
      temperature: 0.0
      max-tokens: 50

    # Custom alias used by `precise-skill` via `metadata.preferred-model`.
    models:
      precise:
        provider: openai
        model: precise-model
        api-key: stub
        temperature: 0.5     # baseline — overridden to 0.0 by the skill
        max-tokens: 500      # baseline — overridden to 50 by the skill

  skill:
    path: classpath:skills/
    hot-reload: false

  routing:
    strategy: hybrid
    fallback-skill: default-skill

  memory:
    composer:
      max-context-tokens: 3000

logging:
  level:
    root: INFO
    ai.gargantua.example.skillllmoverrides: DEBUG
    ai.gargantua.autoconfigure.LlmProviderFactory: DEBUG
