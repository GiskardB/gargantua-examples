# ═══════════════════════════════════════════════════════════════════
# Cookbook AI — fully-local docker-compose stack
#
# Two ways to use this file:
#
#   A) Infrastructure only (run the agent on the host with `mvn`):
#      docker compose up -d ollama mongo redis
#      docker compose exec ollama ollama pull llama3.2:3b    # one-time
#      docker compose exec ollama ollama pull qwen2.5:3b     # one-time, fallback
#      mvn spring-boot:run                                    # from this directory
#
#   B) Everything in containers:
#      docker compose up -d
#      → starts mongo + redis + ollama (auto-pulls both models)
#      → builds & starts the agent on http://localhost:8080
#
# Models:
#   primary  & routing → llama3.2:3b  (~2 GB, best tool-calling under 7B)
#   fallback           → qwen2.5:3b   (~1.9 GB, kicks in when primary fails)
# Both run locally on the same Ollama container. No cloud, no API keys.
# ═══════════════════════════════════════════════════════════════════

services:

  # ── Ollama runtime ────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cookbook-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── Ollama init: auto-pulls both models on first start ─────────
  # Runs once, blocks the agent from starting until the primary model is
  # ready. Fallback is pulled too so the failover path is local-only.
  ollama-init:
    image: ollama/ollama:latest
    container_name: cookbook-ollama-init
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until ollama list 2>/dev/null; do sleep 2; done && \
        ollama pull llama3.2:3b && \
        ollama pull qwen2.5:3b && \
        echo 'Models ready: llama3.2:3b (primary, routing) + qwen2.5:3b (fallback)'
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # ── MongoDB ───────────────────────────────────────────────────────
  mongo:
    image: mongo:8.0
    container_name: cookbook-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: cookbook-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Cookbook AI agent ─────────────────────────────────────────────
  app:
    build: .
    container_name: cookbook-app
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/cookbook_ai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # Primary + routing → llama3.2:3b (better tool-calling)
      LLM_PRIMARY_PROVIDER: ${LLM_PRIMARY_PROVIDER:-ollama}
      LLM_PRIMARY_MODEL: ${LLM_PRIMARY_MODEL:-llama3.2:3b}
      LLM_PRIMARY_ENDPOINT: ${LLM_PRIMARY_ENDPOINT:-http://ollama:11434}
      LLM_PRIMARY_API_KEY: ${LLM_PRIMARY_API_KEY:-}
      # Fallback → qwen2.5:3b (different family from primary)
      LLM_FALLBACK_PROVIDER: ${LLM_FALLBACK_PROVIDER:-ollama}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-qwen2.5:3b}
      LLM_FALLBACK_ENDPOINT: ${LLM_FALLBACK_ENDPOINT:-http://ollama:11434}
      LLM_FALLBACK_API_KEY: ${LLM_FALLBACK_API_KEY:-}
      LLM_ROUTING_PROVIDER: ${LLM_ROUTING_PROVIDER:-ollama}
      LLM_ROUTING_MODEL: ${LLM_ROUTING_MODEL:-llama3.2:3b}
      LLM_ROUTING_ENDPOINT: ${LLM_ROUTING_ENDPOINT:-http://ollama:11434}
      LLM_ROUTING_API_KEY: ${LLM_ROUTING_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:
  ollama-data:
