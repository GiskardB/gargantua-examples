##############################################################################
# AgentKit Example Application - Dev Profile
##############################################################################

server:
  port: 8080

agentkit:
  dry-run:
    enabled: true
    log-prompts: true
  skills:
    hot-reload:
      enabled: true
      watch-interval-seconds: 5
  observability:
    logging:
      include-prompts: true
      include-tool-results: true
  rate-limit:
    enabled: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: INFO
    ai.gargantua: DEBUG
    org.springframework.web: DEBUG
    org.springframework.data.mongodb: DEBUG
