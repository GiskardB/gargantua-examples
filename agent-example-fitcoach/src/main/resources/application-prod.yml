##############################################################################
# AgentKit Example Application - Prod Profile
##############################################################################

server:
  port: ${SERVER_PORT:8080}

agentkit:
  dry-run:
    enabled: false
    log-prompts: false
  skills:
    hot-reload:
      enabled: false
  guardrails:
    input:
      enabled: true
      block-on-fail: true
    output:
      enabled: true
      block-on-fail: true
    pii-detection:
      enabled: true
      action: redact
  observability:
    tracing:
      enabled: true
    logging:
      include-prompts: false
      include-tool-results: false
  rate-limit:
    enabled: true
    requests-per-minute: 30
    tokens-per-minute: 50000

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: WARN
    ai.gargantua: INFO
