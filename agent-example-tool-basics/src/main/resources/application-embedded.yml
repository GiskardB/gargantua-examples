# ══════════════════════════════════════════════════════════════════
# Embedded mode — no MongoDB, no Redis, everything in-memory.
# Activated automatically by the integration test
# (@ActiveProfiles("embedded")) and via SPRING_PROFILES_ACTIVE=embedded
# for `mvn spring-boot:run` runs without Docker.
# ══════════════════════════════════════════════════════════════════

spring:
  autoconfigure:
    exclude:
      # MongoDB (Spring Boot 4.x package names)
      - org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoAutoConfiguration
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoRepositoriesAutoConfiguration
      # Redis (Spring Boot 4.x package names)
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration

management:
  health:
    mongo:
      enabled: false
    redis:
      enabled: false

logging:
  level:
    ai.gargantua: INFO
    ai.gargantua.example.toolbasics: DEBUG
